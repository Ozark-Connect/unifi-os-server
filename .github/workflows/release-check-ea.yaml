name: Check for new EA releases

on:
  workflow_dispatch:
  schedule:
    - cron: "47 * * * *"

# The Ozark-Connect org enforces a read-only default GITHUB_TOKEN, so grant
# the scopes the reusable extract/build jobs and the release job need.
# actions:write lets the release job dispatch build-image on the new tag.
permissions:
  contents: write
  packages: write
  actions: write

jobs:
  release-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      UOS_VERSION: ${{ steps.version.outputs.UOS_VERSION }}
      UOS_DOWNLOAD_AMD64: ${{ steps.version.outputs.UOS_DOWNLOAD_AMD64 }}
      UOS_DOWNLOAD_ARM64: ${{ steps.version.outputs.UOS_DOWNLOAD_ARM64 }}
      HAS_EA: ${{ steps.version.outputs.HAS_EA }}
      RELEASED: ${{ steps.release.outputs.released }}

    steps:
      - name: Get latest EA and release versions
        run: |
          base="https://fw-update.ubnt.com/api/firmware-latest?filter=eq~~product~~unifi-os-server"
          curl -sX GET "${base}&filter=eq~~platform~~linux-x64&filter=eq~~channel~~ea" > linux-amd64.json
          curl -sX GET "${base}&filter=eq~~platform~~linux-arm64&filter=eq~~channel~~ea" > linux-arm64.json
          curl -sX GET "${base}&filter=eq~~platform~~linux-x64&filter=eq~~channel~~release" > linux-amd64-release.json
          jq empty linux-amd64.json
          jq empty linux-arm64.json
          jq empty linux-amd64-release.json

      - name: Extract version and download url for ea
        id: version
        run: |
          # Ubiquiti's EA channel is frequently empty -- EA builds are
          # ephemeral and get pulled once superseded by a stable release.
          # An empty EA channel is a normal "nothing to do" state, NOT an
          # error, so skip gracefully instead of failing the run (which
          # would email a failure notice every hour).
          if [ "$(jq '._embedded.firmware | length' linux-amd64.json)" -eq 0 ]; then
            echo "No active EA build published by Ubiquiti; nothing to do."
            echo "HAS_EA=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "HAS_EA=true" >> "$GITHUB_OUTPUT"

          UOS_VERSION=$(jq -r '._embedded.firmware[0].version // empty' linux-amd64.json | sed 's/^v//')
          UOS_DOWNLOAD_AMD64=$(jq -r '._embedded.firmware[0]._links.data.href // empty' linux-amd64.json)
          UOS_DOWNLOAD_ARM64=$(jq -r '._embedded.firmware[0]._links.data.href // empty' linux-arm64.json)
          REL_VERSION=$(jq -r '._embedded.firmware[0].version // empty' linux-amd64-release.json | sed 's/^v//')

          if [ -z "$UOS_VERSION" ] || [ -z "$UOS_DOWNLOAD_AMD64" ] || [ -z "$UOS_DOWNLOAD_ARM64" ]; then
            echo "Missing version or download URL in JSON" >&2
            exit 1
          fi

          # Export to env
          echo "UOS_VERSION=$UOS_VERSION" >> "$GITHUB_ENV"
          echo "UOS_DOWNLOAD_AMD64=$UOS_DOWNLOAD_AMD64" >> "$GITHUB_ENV"
          echo "UOS_DOWNLOAD_ARM64=$UOS_DOWNLOAD_ARM64" >> "$GITHUB_ENV"
          echo "REL_VERSION=$REL_VERSION" >> "$GITHUB_ENV"

          # Export to outputs
          echo "UOS_VERSION=$UOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "UOS_DOWNLOAD_AMD64=$UOS_DOWNLOAD_AMD64" >> "$GITHUB_OUTPUT"
          echo "UOS_DOWNLOAD_ARM64=$UOS_DOWNLOAD_ARM64" >> "$GITHUB_OUTPUT"

          # Print variables
          echo "EA UOS_VERSION=$UOS_VERSION"
          echo "Current stable REL_VERSION=$REL_VERSION"

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Decide whether to build
        id: release
        if: steps.version.outputs.HAS_EA == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Only build EA when it is strictly newer than the current stable
          # release, otherwise we would publish a pointless X.Y.Z-ea pre-release
          # of a version that is already (or about to be) stable.
          if [ -n "${REL_VERSION}" ]; then
            newest=$(printf '%s\n%s\n' "${UOS_VERSION}" "${REL_VERSION}" | sort -V | tail -1)
            if [ "${UOS_VERSION}" = "${REL_VERSION}" ] || [ "${newest}" != "${UOS_VERSION}" ]; then
              echo "EA ${UOS_VERSION} is not newer than stable ${REL_VERSION}; nothing to do."
              echo "released=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Skip if this EA version already has a release (drafts included,
          # in case a manual draft exists) so we never rebuild it.
          if gh release view "${UOS_VERSION}-ea" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${UOS_VERSION}-ea already exists!"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "EA ${UOS_VERSION} is new!"
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  extract-linux-amd64:
    needs: release-check
    if: "${{ needs.release-check.outputs.RELEASED == 'false' }}"
    uses: ./.github/workflows/extract-linux-amd64.yaml
    with:
      UOS_DOWNLOAD: ${{ needs.release-check.outputs.UOS_DOWNLOAD_AMD64 }}

  extract-linux-arm64:
    needs: release-check
    if: "${{ needs.release-check.outputs.RELEASED == 'false' }}"
    uses: ./.github/workflows/extract-linux-arm64.yaml
    with:
      UOS_DOWNLOAD: ${{ needs.release-check.outputs.UOS_DOWNLOAD_ARM64 }}

  build-uosserver:
    needs: [release-check, extract-linux-amd64, extract-linux-arm64]
    if: "${{ needs.release-check.outputs.RELEASED == 'false' }}"
    uses: ./.github/workflows/build-uosserver.yaml
    with:
      tag: ${{ needs.extract-linux-amd64.outputs.PODMAN_IMAGE_TAG }}

  publish-release:
    runs-on: ubuntu-24.04
    needs: [release-check, extract-linux-amd64, extract-linux-arm64, build-uosserver]
    if: "${{ needs.release-check.outputs.RELEASED == 'false' }}"
    timeout-minutes: 10

    env:
      UOS_VERSION: ${{ needs.release-check.outputs.UOS_VERSION }}
      PODMAN_IMAGE_TAG: ${{ needs.extract-linux-amd64.outputs.PODMAN_IMAGE_TAG }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Update Dockerfile and push bump
        run: |
          # APP_VERSION stays the clean Ubiquiti version; the "-ea" suffix lives
          # only on the git tag / GitHub release / image tag.
          set -euo pipefail
          sed -i "s/uosserver:.*/uosserver:$PODMAN_IMAGE_TAG-multiarch/" Dockerfile
          sed -i "s/APP_VERSION=.*/APP_VERSION=\"$UOS_VERSION\"/" Dockerfile
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Update UniFi OS Server to $UOS_VERSION (EA)"
          # Rebase onto any concurrent main updates before pushing.
          git pull --rebase origin main
          git push origin main
          echo "BUMP_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create pre-release
        run: |
          set -euo pipefail
          gh release create "${UOS_VERSION}-ea" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$BUMP_SHA" \
            --prerelease \
            --title "UniFi OS Server $UOS_VERSION (EA)" \
            --notes "Early Access build of UniFi OS Server $UOS_VERSION as a multi-arch Docker image (linux/amd64 + linux/arm64). Pull ghcr.io/ozark-connect/unifi-os-server:${UOS_VERSION}-ea. Pre-release: not tagged latest. Base image: $PODMAN_IMAGE_TAG-multiarch."

      - name: Trigger image build
        run: |
          # A release created with GITHUB_TOKEN does not fire this repo's
          # release:published trigger (GitHub recursion prevention), so
          # dispatch build-image directly on the new tag. workflow_dispatch
          # is exempt from that rule.
          set -euo pipefail
          gh workflow run build-image.yaml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "refs/tags/${UOS_VERSION}-ea"
